services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    command: >
      sh -c "python -m app.rag.ingest &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
